<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Satellite Night Cruise</title>

	<link href="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.css" rel="stylesheet">

	<style>
		*{
			margin:0;
			padding:0;
			box-sizing:border-box;
		}

		body{
			font-family: 'Consolas', 'Courier New', monospace, sans-serif;
			background: #020205;
			overflow: hidden;
			color: #00ffcc;
		}

		#map{
			width:100vw;
			height:100vh;
		}

		/* SFコックピット風 UIパネル */
		.hud-panel {
			position: absolute;
			background: rgba(5, 10, 20, 0.85);
			border: 1px solid #00ffcc;
			padding: 15px 20px;
			border-radius: 4px;
			backdrop-filter: blur(8px);
			box-shadow: 0 0 20px rgba(0, 255, 204, 0.15);
			z-index: 10;
		}

		.title-hud {
			top: 20px;
			left: 20px;
			width: 320px;
		}

		.title-hud h1 {
			font-size: 20px;
			font-weight: bold;
			letter-spacing: 2px;
			color: #ffffff;
			border-bottom: 1px solid rgba(0, 255, 204, 0.4);
			padding-bottom: 5px;
			margin-bottom: 8px;
		}

		.title-hud p {
			font-size: 11px;
			color: #00ffcc;
			opacity: 0.8;
		}

		/* 右側のステータスモニター */
		.status-hud {
			top: 20px;
			right: 20px;
			width: 240px;
			font-size: 12px;
			line-height: 1.6;
		}

		.status-item {
			display: flex;
			justify-content: space-between;
			margin-bottom: 4px;
		}

		.status-label { color: #88aacc; }
		.status-value { color: #ffffff; font-weight: bold; text-shadow: 0 0 5px #00ffcc;}

		/* 衛星管制風のコントロールボタン */
		.nav-btn {
			position: absolute;
			bottom: 30px;
			right: 30px;
			z-index: 10;
			background: #00ffcc;
			color: #020205;
			border: none;
			padding: 12px 24px;
			font-size: 13px;
			font-weight: bold;
			letter-spacing: 2px;
			cursor: pointer;
			border-radius: 4px;
			box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
			transition: all 0.3s ease;
		}

		.nav-btn:hover {
			background: #ffffff;
			box-shadow: 0 0 25px rgba(255, 255, 255, 0.6);
			transform: scale(1.05);
		}

		/* マップポップアップの近未来化 */
		.maplib
