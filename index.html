<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Lightweight Satellite Cruise</title>

	<link href="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.css" rel="stylesheet">

	<style>
		*{
			margin:0;
			padding:0;
			box-sizing:border-box;
		}

		body{
			font-family: monospace;
			background: #05050a;
			overflow: hidden;
			color: #00ffcc;
		}

		#map{
			width:100vw;
			height:100vh;
		}

		/* 軽くてシンプルなSF風パネル */
		.hud-panel {
			position: absolute;
			background: rgba(10, 10, 20, 0.85);
			border: 1px solid #00ffcc;
			padding: 12px 18px;
			border-radius: 4px;
			z-index: 10;
		}

		.title-hud {
			top: 20px;
			left: 20px;
		}

		.title-hud h1 {
			font-size: 18px;
			color: #ffffff;
			margin-bottom: 2px;
		}

		.title-hud p {
			font-size: 11px;
			color: #00ffcc;
		}

		/* オートパイロットボタン */
		.nav-btn {
			position: absolute;
			bottom: 25px;
			right: 25px;
			z-index: 10;
			background: #00ffcc;
			color: #05050a;
			border: none;
			padding: 10px 20px;
			font-size: 12px;
			font-weight: bold;
			cursor: pointer;
			border-radius: 4px;
			box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
			transition: 0.2s;
		}

		.nav-btn:hover {
			background: #ffffff;
			transform: scale(1.03);
		}

		/* ポップアップ */
		.maplibregl-popup-content {
			background: #0a0a10 !important;
			border: 1px solid #00ffcc !important;
			color: #ffffff !important;
			border-radius: 4px !important;
			padding: 10px !important;
		}

		.maplibregl-popup-content h2 {
			color: #00ffcc;
			font-size: 14px;
			margin-bottom: 4px;
		}

		.maplibregl-popup-content p {
			font-size: 11px;
			color: #cccccc;
		}

		/* 軽量なレーダーピン */
		.radar-dot {
			width: 12px;
			height: 12px;
			background: #00ffcc;
			border: 2px solid #fff;
			border-radius: 50%;
			cursor: pointer;
			box-shadow: 0 0 8px #00ffcc;
		}
	</style>
</head>

<body>

	<div class="hud-panel title-hud">
		<h1>SATELLITE CRUISE v2</h1>
		<p>📍 TOKYO BAY FULL LOOP (8 NODES)</p>
	</div>

	<button class="nav-btn" onclick="toggleAutoPilot()">
		ENGAGE AUTOPILOT
	</button>

	<div id="map"></div>

	<script src="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.js"></script>

	<script>
		// 画像を使わない、超軽量で動作が滑らかな「デモ用ダークスタイル」
		const map = new maplibregl.Map({
			container: 'map',
			style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
			center: [139.85, 35.55],
			zoom: 10,
			pitch: 50,
			bearing: -10,
			attributionControl: false
		});

		// 充実の8箇所スポットデータ
		const locations = [
			{ lng: 139.7671, lat: 35.6812, name: "01: 東京駅", text: "ナイトドライブの始発点" },
			{ lng: 139.8395, lat: 35.7101, name: "02: スカイツリー", text: "サイバーに輝く巨大タワー" },
			{ lng: 139.7633, lat: 35.6366, name: "03: レインボーブリッジ", text: "駆け抜ける都市の夜景" },
			{ lng: 139.7820, lat: 35.5480, name: "04: 羽田空港周辺", text: "滑走路のライトが幻想的" },
			{ lng: 139.7400, lat: 35.5200, name: "05: 川崎工場地帯", text: "近未来SF感満載の工場夜景" },
			{ lng: 139.7606, lat: 35.6264, name: "06: 大黒PA", text: "車好きが集まる聖地ジャンクション" },
			{ lng: 139.8747, lat: 35.4632, name: "07: 海ほたるPA", text: "東京湾の真ん中に浮かぶ要塞" },
			{ lng: 140.1233, lat: 35.6074, name: "08: 千葉フォルニア", text: "対岸のビル群を望む海岸通" }
		];

		// ピンを設置
		locations.forEach(loc => {
			const el = document.createElement('div');
			el.className = 'radar-dot';

			new maplibregl.Marker(el)
				.setLngLat([loc.lng, loc.lat])
				.setPopup(
					new maplibregl.Popup({ offset: 12, closeButton: false })
					.setHTML(`<h2>${loc.name}</h2><p>${loc.text}</p>`)
				)
				.addTo(map);
		});

		map.on('load', () => {
			// 8個のピンを綺麗に一本に繋ぐドライブコース
			map.addSource('cyber-route', {
				type: 'geojson',
				data: {
					type: 'Feature',
					geometry: {
						type: 'LineString',
						coordinates: [
							[139.7671, 35.6812], // 東京駅
							[139.8395, 35.7101], // スカイツリー
							[139.7633, 35.6366], // レインボーブリッジ
							[139.7820, 35.5480], // 羽田
							[139.7400, 35.5200], // 川崎工場
							[139.7606, 35.6264], // 大黒PA
							[139.8747, 35.4632], // 海ほたる
							[140.1233, 35.6074], // 千葉フォルニア
							[139.7671, 35.6812]  // 東京駅に戻る
						]
					}
				}
			});

			// 光るネオンライン
			map.addLayer({
				id: 'laser-line',
				type: 'line',
				source: 'cyber-route',
				paint: {
					'line-color': '#00ffcc',
					'line-width': 3,
					'line-opacity': 0.8
				}
			});
		});

		// オートパイロット（自動旋回）
		let isAutoPilot = false;
		let animationFrameId = null;

		function toggleAutoPilot() {
			const btn = document.querySelector('.nav-btn');

			if (!isAutoPilot) {
				isAutoPilot = true;
				btn.innerText = "DISENGAGE";
				btn.style.background = "#ff0055";
				btn.style.color = "#fff";

				map.flyTo({
					center: [139.82, 35.58], // 全体が見渡せる中心
					zoom: 10.5,
					pitch: 55,
					bearing: 0,
					speed: 0.5,
					essential: true
				});

				map.once('moveend', startOrbitalRotation);
			} else {
				isAutoPilot = false;
				btn.innerText = "ENGAGE AUTOPILOT";
				btn.style.background = "#00ffcc";
				btn.style.color = "#05050a";

				if (animationFrameId) {
					cancelAnimationFrame(animationFrameId);
				}
			}
		}

		function startOrbitalRotation() {
			if (!isAutoPilot) return;
			map.setBearing(map.getBearing() + 0.05); // 軽快に回るよう少し速度調整
			animationFrameId = requestAnimationFrame(startOrbitalRotation);
		}
	</script>

</body>
</html>
