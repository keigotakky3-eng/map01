<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Cyber Night Drive Map</title>

			margin:0;
			padding:0;
			box-sizing:border-box;

		body{
			font-family: 'Helvetica Neue', Arial, sans-serif;
			background: #05050a;
			overflow: hidden;
			color: #fff;
		}

		#map{
			width:100vw;
			height:100vh;
			filter: saturate(1.2) contrast(1.1); /* 地図の発色を少しサイバーに */
		}

		/* 共通のネオンガラスモルフィズムスタイル */
		.glass-panel {
			background: rgba(10, 10, 20, 0.75);
			border: 1px solid rgba(0, 191, 255, 0.2);
			border-radius: 16px;
			backdrop-filter: blur(12px);
			-webkit-backdrop-filter: blur(12px);
			box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.7),

			color: white;
			z-index: 10;
		}

		.title{
			position:absolute;
			top:20px;
			left:20px;
			padding:18px 25px;
		}

		.title h1{
			font-size:26px;
			font-weight: 800;
			letter-spacing: 1px;
			text-shadow: 0 0 10px rgba(0, 191, 255, 0.6),
			             0 0 20px rgba(0, 191, 255, 0.3);
			margin-bottom:5px;
		}

		.title p{
			font-size:13px;
			color:#8a99ad;
			letter-spacing: 0.5px;
		}

			padding: 18px !important;
			box-shadow: 0 0 25px rgba(255, 0, 127, 0.4) !important;
			backdrop-filter: blur(8px);
		}

		.maplibregl-popup-content h2{
			margin-bottom:8px;
			color:#ff007f;
			font-size: 20px;
			text-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
		}

		.maplibregl-popup-content p {
			color: #ddd;
			font-size: 14px;
			line-height: 1.4;
		}

			border-top-color: #ff007f !important;
		}
