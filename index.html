<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Satellite Night Cruise</title>

	<link href="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.css" rel="stylesheet">

	<style>
		*{
			margin:0;
			padding:0;
			box-sizing:border-box;
		}

		body{
			font-family: 'Consolas', 'Courier New', monospace, sans-serif;
			background: #020205;
			overflow: hidden;
			color: #00ffcc;
		}

		#map{
			width:100vw;
			height:100vh;
		}

		/* SFコックピット風 UIパネル */
		.hud-panel {
			position: absolute;
			background: rgba(5, 10, 20, 0.85);
			border: 1px solid #00ffcc;
			padding: 15px 20px;
			border-radius: 4px;
			backdrop-filter: blur(8px);
			box-shadow: 0 0 20px rgba(0, 255, 204, 0.15);
			z-index: 10;
		}

		.title-hud {
			top: 20px;
			left: 20px;
			width: 320px;
		}

		.title-hud h1 {
			font-size: 20px;
			font-weight: bold;
			letter-spacing: 2px;
			color: #ffffff;
			border-bottom: 1px solid rgba(0, 255, 204, 0.4);
			padding-bottom: 5px;
			margin-bottom: 8px;
		}

		.title-hud p {
			font-size: 11px;
			color: #00ffcc;
			opacity: 0.8;
		}

		/* 右側のステータスモニター */
		.status-hud {
			top: 20px;
			right: 20px;
			width: 240px;
			font-size: 12px;
			line-height: 1.6;
		}

		.status-item {
			display: flex;
			justify-content: space-between;
			margin-bottom: 4px;
		}

		.status-label { color: #88aacc; }
		.status-value { color: #ffffff; font-weight: bold; text-shadow: 0 0 5px #00ffcc;}

		/* 衛星管制風のコントロールボタン */
		.nav-btn {
			position: absolute;
			bottom: 30px;
			right: 30px;
			z-index: 10;
			background: #00ffcc;
			color: #020205;
			border: none;
			padding: 12px 24px;
			font-size: 13px;
			font-weight: bold;
			letter-spacing: 2px;
			cursor: pointer;
			border-radius: 4px;
			box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
			transition: all 0.3s ease;
		}

		.nav-btn:hover {
			background: #ffffff;
			box-shadow: 0 0 25px rgba(255, 255, 255, 0.6);
			transform: scale(1.05);
		}

		/* マップポップアップの近未来化 */
		.maplibregl-popup-content {
			background: rgba(2, 2, 5, 0.9) !important;
			border: 1px solid #00ffcc !important;
			color: #ffffff !important;
			border-radius: 4px !important;
			padding: 12px !important;
			font-family: monospace;
		}

		.maplibregl-popup-content h2 {
			color: #00ffcc;
			font-size: 15px;
			letter-spacing: 1px;
			margin-bottom: 6px;
			border-bottom: 1px solid rgba(0,255,204,0.2);
		}

		.maplibregl-popup-content p {
			font-size: 11px;
			color: #aabbcc;
		}

		.maplibregl-popup-tip {
			border-top-color: #00ffcc !important;
		}

		/* レーダーの点のようなマーカー */
		.radar-dot {
			width: 14px;
			height: 14px;
			background: #ffffff;
			border-radius: 50%;
			position: relative;
			cursor: pointer;
		}

		.radar-dot::after {
			content: '';
			position: absolute;
			width: 100%;
			height: 100%;
			top: 0;
			left: 0;
			background: #00ffcc;
			border-radius: 50%;
			animation: pulse 2s infinite;
		}

		@keyframes pulse {
			0% { transform: scale(1); opacity: 1; }
			100% { transform: scale(3.5); opacity: 0; }
		}

	</style>
</head>

<body>

	<!-- 左上：メインパネル -->
	<div class="hud-panel title-hud">
		<h1>SATELLITE CRUISE</h1>
		<p>SYSTEM: ACTIVE // ORBITAL VIEW</p>
		<p style="margin-top: 5px;">📍 TOKYO BAY AREA HIGHWAY LOOP</p>
	</div>

	<!-- 右上：テレメトリーパネル -->
	<div class="hud-panel status-hud">
		<div class="status-item"><span class="status-label">MODE:</span><span class="status-value" id="mode-text">STANDBY</span></div>
		<div class="status-item"><span class="status-label">ALTITUDE:</span><span class="status-value" id="alt-text">4,200 km</span></div>
		<div class="status-item"><span class="status-label">BEARING:</span><span class="status-value" id="bear-text">-20.0°</span></div>
		<div class="status-item"><span class="status-label">AUDIO:</span><span class="status-value" style="color:#ff0055;">EUROBEAT.LOG</span></div>
	</div>

	<button class="nav-btn" onclick="toggleAutoPilot()">
		ENGAGE AUTOPILOT
	</button>

	<div id="map"></div>

	<script src="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.js"></script>

	<script>
		// 暗色ハイブリッド衛星写真スタイル
		const map = new maplibregl.Map({
			container: 'map',
			style: {
				version: 8,
				sources: {
					'satellite': {
						type: 'raster',
						tiles: ['https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}'],
						tileSize: 256,
						attribution: 'Google Imagery'
					}
				},
				layers: [
					{ id: 'satellite-layer', type: 'raster', source: 'satellite' },
					{
						id: 'darken-layer',
						type: 'background',
						paint: { 'background-color': '#020205', 'background-opacity': 0.25 }
					}
				]
			},
			center: [139.9, 35.65],
			zoom: 9.5,
			pitch: 45,
			bearing: -20,
			attributionControl: false
		});

		const locations = [
			{ lng: 139.7671, lat: 35.6812, name: "CORE-01: TOKYO", text: "東京駅上空エリア" },
			{ lng: 139.8395, lat: 35.7101, name: "NODE-02: SKYTREE", text: "墨田タワーセクター" },
			{ lng: 140.1233, lat: 35.6074, name: "POINT-03: CHIBALFORNIA", text: "湾岸アウトライン終端" },
			{ lng: 139.7606, lat: 35.6264, name: "BASE-04: DAIKOKU", text: "横浜ベイ・ジャンクション" }
		];

		// レーダー風マーカー設置
		locations.forEach(loc => {
			const el = document.createElement('div');
			el.className = 'radar-dot';

			new maplibregl.Marker(el)
				.setLngLat([loc.lng, loc.lat])
				.setPopup(
					new maplibregl.Popup({ offset: 15, closeButton: false })
					.setHTML(`<h2>${loc.name}</h2><p>${loc.text}</p>`)
				)
				.addTo(map);
		});

		map.on('load', () => {
			// 夜光ワイヤールートの定義
			map.addSource('cyber-route', {
				type: 'geojson',
				data: {
					type: 'Feature',
					geometry: {
						type: 'LineString',
						coordinates: [
							[139.7671, 35.6812],
							[139.8395, 35.7101],
							[140.1233, 35.6074],
							[139.7606, 35.6264],
							[139.7671, 35.6812]
						]
					}
				}
			});

			// ネオンレーザーライン
			map.addLayer({
				id: 'laser-line',
				type: 'line',
				source: 'cyber-route',
				paint: {
					'line-color': '#00ffcc',
					'line-width': 3,
					'line-opacity': 0.8
				}
			});

			// HUDの数値を書き換えるリアルタイム演出
			map.on('move', () => {
				const zoom = map.getZoom();
				const bearing = map.getBearing();
				const fakeAltitude = Math.round((20 - zoom) * 120);
				
				document.getElementById('alt-text').innerText = `${fakeAltitude} km`;
				document.getElementById('bear-text').innerText = `${bearing.toFixed(1)}°`;
			});
		});

		// オートパイロット制御
		let isAutoPilot = false;
		let animationFrameId = null;

		function toggleAutoPilot() {
			const btn = document.querySelector('.nav-btn');
			const modeText = document.getElementById('mode-text');

			if (!isAutoPilot) {
				isAutoPilot = true;
				btn.innerText = "DISENGAGE SYSTEM";
				btn.style.background = "#ff0055";
				btn.style.color = "#fff";
				modeText.innerText = "CRUISING";
				modeText.style.color = "#ff0055";

				map.flyTo({
					center: [139.7671, 35.6812],
					zoom: 13.5,
					pitch: 65,
					bearing: 0,
					speed: 0.7,
					curve: 1.5,
					essential: true
				});

				map.once('moveend', startOrbitalRotation);

			} else {
				isAutoPilot = false;
				btn.innerText = "ENGAGE AUTOPILOT";
				btn.style.background = "#00ffcc";
				btn.style.color = "#020205";
				modeText.innerText = "STANDBY";
				modeText.style.color = "#ffffff";

				if (animationFrameId) {
					cancelAnimationFrame(animationFrameId);
				}

				map.flyTo({
					center: [139.9, 35.65],
					zoom: 9.5,
					pitch: 45,
					bearing: -20,
					speed: 0.8
				});
			}
		}

		function startOrbitalRotation() {
			if (!isAutoPilot) return;
			const currentBearing = map.getBearing();
			map.setBearing(currentBearing + 0.08);
			animationFrameId = requestAnimationFrame(startOrbitalRotation);
		}
	</script>

</body>
</html>
